<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>God Simulator</title>

<style>
body {
  margin: 0;
  background: #020617;
  color: #e5e7eb;
  font-family: Arial;
  overflow: hidden;
}

#topbar {
  height: 50px;
  background: #111827;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
}

#controls {
  display: flex;
  gap: 10px;
}

button {
  background: #1f2937;
  border: none;
  color: white;
  padding: 6px 10px;
  cursor: pointer;
}

#world {
  display: block;
}

#info {
  position: absolute;
  right: 10px;
  top: 60px;
  width: 250px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  max-height: 80vh;
  overflow-y: auto;
}
</style>
</head>

<body>

<div id="topbar">
  <div>🌍 God Simulator</div>

  <div id="controls">
    <button onclick="togglePause()">⏯ Pause</button>
    <button onclick="speedUp()">⚡ Speed+</button>
    <button onclick="resetCamera()">🎯 Reset View</button>
  </div>

  <div id="status">Connecting...</div>
</div>

<canvas id="world"></canvas>
<div id="info">Click agent...</div>

<script src="main.js"></script>
</body>
</html>
